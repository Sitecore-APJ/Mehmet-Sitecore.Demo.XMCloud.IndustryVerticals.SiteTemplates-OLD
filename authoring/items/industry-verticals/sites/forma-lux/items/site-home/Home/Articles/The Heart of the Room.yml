    - ID: "56a52337-177b-46b4-ae72-6b9083bb6700"
      Hint: Content
      Value: |
        <div class="ck-content"><p>Now in its 16th year, the Annual Charity Golf Day for the Caroline Chisholm Education Foundation was held on the green at Yarra Yarra Golf Club, with 82 players on the day.</p><p>This year’s participants included Chisholm Institute staff, local businesses and sponsors to the Caroline Chisholm Education Foundation, with 21 teams participating in a competitive Ambrose-style round over 18 holes. Games included a hole-in-one chance to win a Mercedes-Benz, sponsored by Mercedes-Benz Waverley, Longest Drive Pro with Golf Pro Steffan Scutti and Nearest Pin.</p><p>Caroline Chisholm Education Foundation’s Executive Officer, Farrah Buckland, says the Annual Charity Golf Day is the foundation’s major fundraising event of the year.</p><p>“The majority of the players come back year after year to enjoy a day of golf with colleagues and friends”</p><p>“It also helps raise funds for a great cause, for student scholarships.”</p><p>The day concluded with a two-course dinner with 95 guests in attendance. Special guest speakers for the evening were scholarship recipients Angel, Izzy and Kyle, who shared their experience of being awarded a scholarship, and the impact it has made in their lives.</p><p>Auctioneer John Shore hosted the live auction at the dinner, raising funds for the Caroline Chisholm Education Foundation.</p><p>Congratulations to the winners of the event for 2026: Michael Bunn, Tony Valena, Simon Richards and Stephen Mitchell.</p><p>The next Annual Charity Golf Day will be held on 15 March, 2027 at Yarra Yarra Golf Club.</p><p>To subscribe for updates, email: ccef@chisholm.edu.au or visit: chisholm.edu.au/ccef</p></div>
